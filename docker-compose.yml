services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DATA_DIR: /app/sap-o2c-data
      ALLOWED_ORIGINS: http://localhost:8080
      WEB_CONCURRENCY: 1
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ""
    depends_on:
      - backend
    ports:
      - "8080:80"
